spring:
  application:
    name: nss-platform
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:postgresql://localhost:5432/nssdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    connect-retries: 5

server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:NSS-VIIT-PUNE-DEV-SECRET-CHANGE-IN-PROD-2024}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}

logging:
  level:
    com.nssplatform: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
