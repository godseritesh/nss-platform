spring:
  application:
    name: nss-platform
  datasource:
    # Railway injects DATABASE_URL as postgres://user:pass@host:port/db
    # Spring needs jdbc:postgresql:// format, so we use DATABASE_URL env var
    # with a Hikari-compatible URL. Railway also exposes PGHOST etc.
    # Priority: DATABASE_URL → DB_URL → local dev default
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nssdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5          # Railway free tier has connection limits
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:NSS-VIIT-PUNE-DEV-SECRET-CHANGE-IN-PROD-2024}
    expiration-ms: 86400000       # 24 hours
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}

logging:
  level:
    com.nssplatform: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{30} - %msg%n"
