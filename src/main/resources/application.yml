spring:
  application:
    name: nss-platform
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:postgresql://localhost:5432/nssdb
    username: postgres
    password: postgres
    hikari:
      connection-timeout: 15000
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    connect-retries: 5
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          starttls:
            enable: ${SMTP_TLS:false}
          auth: ${SMTP_AUTH:false}

server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:$(cat /etc/nss-platform/jwt-secret)}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}
  email:
    from: nss@viit.ac.in

logging:
  level:
    com.nssplatform: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO