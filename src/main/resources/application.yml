# src/main/resources/bootstrap.yml
env:
  - name: SMTP_HOST
    value: 'localhost'
  - name: SMTP_PORT
    value: '25'
  - name: SMTP_USER
    value: 'smtp_user'
  - name: SMTP_PASS
    value: 'smtp_password'
    secure: true
  - name: SMTP_TLS
    value: 'true'
  - name: SMTP_AUTH
    value: 'true'
  - name: JWT_SECRET
    value: 'your-jwt-secret'
    sensitive: true
  - name: APP_PORT
    value: '8080'
  - name: CORS_ORIGINS
    value: 'http://localhost:5173,http://localhost:8080'

# src/main/resources/application.yml
spring:
  application:
    name: nss-platform
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:postgresql://localhost:5432/nssdb
    username: postgres
    password: postgres
    hikari:
      connection-timeout: 15000
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    connect-retries: 5
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          starttls:
            enable: ${SMTP_TLS}
          auth: ${SMTP_AUTH}

server:
  port: ${APP_PORT}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS}
  email:
    from: nss@viit.ac.in

logging:
  level:
    com.nssplatform: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO