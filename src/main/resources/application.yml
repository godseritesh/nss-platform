spring:
  application:
    name: nss-platform
  # We now use DatabaseConfig.java for datasource setup to handle Railway URLs
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:NSS-VIIT-PUNE-DEV-SECRET-CHANGE-IN-PROD-2024}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}

logging:
  level:
    com.nssplatform: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
