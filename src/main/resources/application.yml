spring:
  application:
    name: nss-platform
  datasource:
    # Railway provides DATABASE_URL. We use this regex trick to convert 
    # postgres://... to jdbc:postgresql://... at runtime.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nssdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  # Force port to 8080 to avoid the 5432 conflict seen in logs
  port: ${APP_PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:NSS-VIIT-PUNE-DEV-SECRET-CHANGE-IN-PROD-2024}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}

logging:
  level:
    com.nssplatform: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
