    properties:
      mail:
        smtp:
          starttls:
            enable: true
          auth: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-autumn-hill-ao8yoixr-pooler.c-2.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require}
    username: ${DB_USERNAME:neondb_owner}
