services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nssdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      APP_PORT: "8080"
      DB_URL: jdbc:postgresql://db:5432/nssdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      JWT_SECRET: dev-secret-key-change-in-prod-min-32-chars!!
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
