# render.yaml — Render Blueprint (Infrastructure as Code)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nss-platform
    env: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_PORT
        value: "8080"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
